<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Premium Tasarım Showcase | Basic · Modern · Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0e16;
            color: #edf2f8;
            padding: 2rem 1.8rem;
        }

        /* KONTROL PANELİ */
        .controller {
            max-width: 1400px;
            margin: 0 auto 2rem auto;
            background: rgba(18, 22, 35, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.5rem 2rem;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .label {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: #f5a623;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
        }

        .theme-btn, .pack-btn {
            background: #1e2436;
            border: 1px solid #2f364a;
            padding: 8px 24px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .theme-btn.active, .pack-btn.active {
            background: #f5a623;
            border-color: #f5a623;
            color: #0c0f17;
            box-shadow: 0 0 14px rgba(245,166,35,0.5);
        }

        /* PREVIEW ALANI */
        .live-preview {
            max-width: 1400px;
            margin: 0 auto;
            background: #080b12;
            border-radius: 2rem;
            padding: 1rem;
            border: 1px solid #262e3c;
        }

        /* ========= TEMA 1: BASIC (Minimal, pastel tonlar, yumuşak gölgeler) ========= */
        .theme-basic {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-light: #475569;
            --primary: #3b82f6;
            --border: #e2e8f0;
            --radius: 16px;
            --shadow: 0 4px 12px rgba(0,0,0,0.03);
        }
        .theme-basic .mock-site {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            border-radius: 24px;
            overflow: hidden;
        }
        .theme-basic .header {
            background: var(--surface);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .theme-basic .hero {
            background: linear-gradient(105deg, #eff6ff, #ffffff);
            padding: 3rem 2rem;
            text-align: center;
        }
        .theme-basic .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .theme-basic .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 40px;
            padding: 6px 18px;
        }
        .theme-basic .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 12px;
        }

        /* ========= TEMA 2: MODERN (Karanlık + neon vurgular, büyük fontlar) ========= */
        .theme-modern {
            --bg: #0a0f1c;
            --surface: #131a2c;
            --text: #eef2ff;
            --text-light: #9aa5c0;
            --primary: #e63946;
            --border: #253045;
            --radius: 28px;
            --shadow: 0 15px 25px -12px rgba(0,0,0,0.5);
        }
        .theme-modern .mock-site {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', monospace;
            border-radius: 32px;
            overflow: hidden;
        }
        .theme-modern .header {
            background: var(--surface);
            padding: 1.2rem 2rem;
            border-bottom: 2px solid var(--primary);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .theme-modern .hero {
            background: radial-gradient(circle at 10% 20%, #1e2a44, #0a0f1c);
            padding: 3.5rem 2rem;
            text-align: center;
        }
        .theme-modern .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.4rem;
            border: 1px solid var(--border);
            transition: 0.2s;
        }
        .theme-modern .card:hover { transform: translateY(-4px); box-shadow: var(--shadow);}
        .theme-modern .btn-primary {
            background: var(--primary);
            border-radius: 60px;
            padding: 8px 24px;
            font-weight: 600;
        }
        .theme-modern .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 20px;
        }

        /* ========= TEMA 3: PREMIUM PRO (Lüks, cam efekti, serif başlık) ========= */
        .theme-premium {
            --bg: #070b14;
            --surface: rgba(25, 33, 56, 0.7);
            --text: #f3f6fc;
            --text-light: #bfc9e0;
            --primary: #cf94ff;
            --border: rgba(255,255,255,0.08);
            --radius: 36px;
            --shadow: 0 25px 40px -15px black;
        }
        .theme-premium .mock-site {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(4px);
            border-radius: 48px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }
        .theme-premium .header {
            background: rgba(15, 22, 40, 0.8);
            backdrop-filter: blur(20px);
            padding: 1.2rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .theme-premium .hero {
            text-align: center;
            padding: 4rem 2rem;
            background: radial-gradient(ellipse at 30% 40%, rgba(207,148,255,0.1), transparent);
        }
        .theme-premium .card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border-radius: var(--radius);
            padding: 1.6rem;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .theme-premium .card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 35px -12px black;
        }
        .theme-premium .btn-glow {
            background: linear-gradient(105deg, #cf94ff, #9b5de5);
            border-radius: 60px;
            padding: 12px 32px;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(207,148,255,0.4);
        }
        .theme-premium .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 24px;
        }
        .theme-premium .gallery-item {
            background: rgba(40, 50, 75, 0.6);
            border-radius: 28px;
            padding: 1.2rem;
            transition: 0.2s;
        }

        /* ORTAK YARDIMCILAR */
        .flex-sb { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 1rem; }
        .chip { background: rgba(255,255,255,0.05); border-radius: 40px; padding: 6px 12px; font-size:0.75rem; display: inline-block; }
        .content-space { padding: 1.8rem; }
        hr { border-color: #2e3a4e; margin: 12px 0; }
        .mt-1 { margin-top: 1rem; }
    </style>
</head>
<body>

<div class="controller">
    <div class="label"><i class="fas fa-bezier-curve"></i> 1. Tasarım Teması (Tamamen farklı UI)</div>
    <div class="btn-wrap" id="themeWrap">
        <button class="theme-btn" data-theme="basic">🎨 Basic – Sade & Pastel</button>
        <button class="theme-btn active" data-theme="modern">🌙 Modern – Neon & Koyu</button>
        <button class="theme-btn" data-theme="premium">👑 Premium – Lüks & Glow</button>
    </div>

    <div class="label"><i class="fas fa-cubes"></i> 2. Paket (İçerik Özellikleri)</div>
    <div class="btn-wrap" id="packWrap">
        <button class="pack-btn" data-pack="starter">🚀 Başlangıç</button>
        <button class="pack-btn active" data-pack="business">🏪 Küçük İşletme</button>
        <button class="pack-btn" data-pack="enterprise">🏢 Büyük İşletme</button>
        <button class="pack-btn" data-pack="pro">💼 Profesyonel</button>
    </div>
    <div style="font-size:0.7rem; text-align:center; margin-top:6px;">✨ Tasarım seçenekleri: farklı renk paleti, tipografi, kart stilleri, HEADER/HERO yapısı, hover efektleri. Paketler içerik zenginliğini belirler.</div>
</div>

<div class="live-preview" id="previewLive">
    <div id="dynamicRender">Yükleniyor...</div>
</div>

<script>
    let activeTheme = "modern";
    let activePack = "business";

    const packageProps = {
        starter: {
            whatsapp: true, call: true, contactInfo: true,
            contactForm: false, simpleGallery: true, advancedGallery: false,
            services: true, team: false, reviews: false, map: true,
            extraGallery: false
        },
        business: {
            whatsapp: true, call: true, contactInfo: true,
            contactForm: true, simpleGallery: true, advancedGallery: false,
            services: true, team: true, reviews: false, map: true,
            extraGallery: false
        },
        enterprise: {
            whatsapp: true, call: true, contactInfo: true,
            contactForm: true, simpleGallery: false, advancedGallery: true,
            services: true, team: true, reviews: true, map: true,
            extraGallery: false
        },
        pro: {
            whatsapp: true, call: true, contactInfo: true,
            contactForm: true, simpleGallery: false, advancedGallery: false,
            services: true, team: true, reviews: true, map: true,
            extraGallery: true
        }
    };

    function renderUI() {
        const f = packageProps[activePack];
        const container = document.getElementById("dynamicRender");
        let themeClass = "";
        if (activeTheme === "basic") themeClass = "theme-basic";
        else if (activeTheme === "modern") themeClass = "theme-modern";
        else themeClass = "theme-premium";

        let headerHtml = "", heroHtml = "";

        // TEMA BAZLI HEADER VE HERO (farklı stiller)
        if (activeTheme === "basic") {
            headerHtml = `<div class="header"><div style="font-weight:800;">🌿 BasicStudio</div><div style="display:flex; gap:1.2rem;"><span>Ana Sayfa</span><span>İşler</span><span>İletişim</span></div></div>`;
            heroHtml = `<div class="hero"><h2 style="font-size:2rem;">Sade ve Etkili Tasarım</h2><p>İşletmenizi öne çıkaracak minimal çözümler.</p></div>`;
        } else if (activeTheme === "modern") {
            headerHtml = `<div class="header"><div style="font-weight:800; font-size:1.3rem;">⚡ NEO<span style="color:#e63946;">STUDIO</span></div><div style="display:flex; gap:1.5rem;"><i class="fas fa-th"></i><span>Portfolyo</span><span>Ekip</span><span>Bize Ulaş</span></div></div>`;
            heroHtml = `<div class="hero"><h1 style="font-size:2.8rem; font-weight:800;">Yaratıcılığın Sınırı Yok</h1><p>Modern web deneyimi ile fark yaratın.</p><button class="btn-primary" style="margin-top:1rem;">Keşfet</button></div>`;
        } else {
            headerHtml = `<div class="header"><div style="font-weight:800; font-size:1.6rem; letter-spacing:-1px;">✨ AURORA<span style="font-size:0.8rem;"> PREMIUM</span></div><div style="display:flex; gap:2rem;"><span>Anasayfa</span><span>Hizmetler</span><span>Lüks Galeri</span><span>İletişim</span></div></div>`;
            heroHtml = `<div class="hero"><h1 style="font-family:'Playfair Display', serif; font-size:3.8rem; font-weight:800;">Yüksek Standartlar</h1><p>Premium kalite, kusursuz deneyim.</p><button class="btn-glow" style="margin-top:1rem;">İncele</button></div>`;
        }

        let content = `<div class="mock-site ${themeClass}">`;
        content += headerHtml;
        content += heroHtml;
        content += `<div class="content-space">`;

        // İletişim & Button Bloğu
        if (f.whatsapp || f.call || f.contactInfo) {
            let btnClass = activeTheme === "basic" ? "btn-outline" : (activeTheme === "modern" ? "btn-primary" : "btn-glow");
            content += `<div class="card" style="margin-bottom:1.5rem;">
                            <div class="flex-sb">
                                <div style="display: flex; gap: 12px;">
                                    ${f.whatsapp ? `<span class="${btnClass}" style="display:inline-flex; gap:6px;"><i class="fab fa-whatsapp"></i> WhatsApp</span>` : ''}
                                    ${f.call ? `<span class="${btnClass}" style="display:inline-flex; gap:6px;"><i class="fas fa-phone-alt"></i> Tıkla Ara</span>` : ''}
                                </div>
                                ${f.contactInfo ? `<div style="font-size:0.75rem;"><i class="fas fa-envelope"></i> info@tasarim.com | 📍 İstanbul</div>` : ''}
                            </div>
                        </div>`;
        }

        // İletişim Formu
        if (f.contactForm) {
            content += `<div class="card" style="margin-bottom:1.5rem;">
                            <div style="font-weight:600; margin-bottom:12px;">📋 Hızlı İletişim</div>
                            <div style="display: flex; flex-wrap: wrap; gap: 12px;">
                                <input type="text" placeholder="Adınız" style="background:#1e2535; border:1px solid #2e384a; border-radius: 60px; padding: 8px 16px; flex:1; color:white;">
                                <input type="email" placeholder="Email" style="background:#1e2535; border:1px solid #2e384a; border-radius: 60px; padding: 8px 16px; flex:1; color:white;">
                                <button style="background: ${activeTheme === 'premium' ? '#cf94ff' : '#e63946'}; border: none; border-radius:60px; padding:8px 20px; color:white;">Gönder</button>
                            </div>
                        </div>`;
        }

        // Google Harita
        if (f.map) {
            content += `<div class="card" style="margin-bottom:1.5rem;">
                            <div style="font-weight:600; margin-bottom:10px;">📍 Konum</div>
                            <div style="background:#1a2132; height:130px; border-radius: 24px; display: flex; align-items:center; justify-content:center;">🗺️ Google Maps Önizlemesi</div>
                        </div>`;
        }

        // Hizmetler
        if (f.services) {
            content += `<div class="card" style="margin-bottom:1.5rem;">
                            <div style="font-weight:600; margin-bottom:12px;">🛠️ Hizmetlerimiz</div>
                            <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                                <span class="chip">Kaporta Düzeltme</span>
                                <span class="chip">Boyasız Göçük</span>
                                <span class="chip">Çekme & Şasi</span>
                            </div>
                        </div>`;
        }

        // GALERİ
        if (f.simpleGallery) {
            content += `<div class="card" style="margin-bottom:1.5rem;">
                            <div style="font-weight:600; margin-bottom:12px;">📸 Görsel Galeri</div>
                            <div class="gallery-grid">
                                <div class="gallery-item">Görsel 1</div><div class="gallery-item">Görsel 2</div><div class="gallery-item">Görsel 3</div>
                            </div>
                        </div>`;
        }
        if (f.advancedGallery) {
            content += `<div class="card" style="margin-bottom:1.5rem;">
                            <div style="font-weight:600; margin-bottom:12px;">🎯 Gelişmiş Galeri</div>
                            <div class="gallery-grid" style="grid-template-columns:repeat(2,1fr);">
                                <div class="gallery-item">Proje Alpha</div><div class="gallery-item">Proje Beta</div>
                                <div class="gallery-item">Proje Gamma</div><div class="gallery-item">Proje Delta</div>
                            </div>
                        </div>`;
        }
        if (f.extraGallery) {
            content += `<div class="card" style="margin-bottom:1.5rem;">
                            <div style="font-weight:600; margin-bottom:12px;">💎 Premium Galeri</div>
                            <div class="gallery-grid" style="grid-template-columns:repeat(3,1fr);">
                                <div class="gallery-item">Ultra HD 1</div><div class="gallery-item">Ultra HD 2</div><div class="gallery-item">Ultra HD 3</div>
                            </div>
                        </div>`;
        }

        // Ekip & Hakkımızda
        if (f.team) {
            content += `<div class="card" style="margin-bottom:1.5rem;">
                            <div style="font-weight:600; margin-bottom:12px;">👥 Profesyonel Ekip</div>
                            <div class="grid-2">
                                <div style="background:#1b212f; border-radius: 24px; padding: 1rem; text-align:center;"><i class="fas fa-user-tie fa-2x"></i><br><strong>Ahmet Usta</strong><br>Teknik Lider</div>
                                <div style="background:#1b212f; border-radius: 24px; padding: 1rem; text-align:center;"><i class="fas fa-user-graduate fa-2x"></i><br><strong>Elif H.</strong><br>Tasarım</div>
                                <div style="background:#1b212f; border-radius: 24px; padding: 1rem; text-align:center;"><i class="fas fa-user-astronaut fa-2x"></i><br><strong>Can Bey</strong><br>Proje Yön.</div>
                            </div>
                        </div>`;
        }

        // Google Yorumları
        if (f.reviews) {
            content += `<div class="card" style="margin-bottom:1.5rem;">
                            <div style="font-weight:600; margin-bottom:12px;"><i class="fab fa-google"></i> Müşteri Yorumları</div>
                            <div style="background:#1c2335; border-radius: 20px; padding: 12px; margin-bottom: 8px;">⭐⭐⭐⭐⭐ “Harika işçilik, hızlı servis.” – Mehmet K.</div>
                            <div style="background:#1c2335; border-radius: 20px; padding: 12px;">⭐⭐⭐⭐☆ “İlgili ekip, memnun kaldım.” – Sibel D.</div>
                            <div class="mt-1">⭐ 4.9 ★ (42 değerlendirme)</div>
                        </div>`;
        }

        content += `</div>`; // content-space

        // Footer (her temada farklı)
        let footerText = "";
        if (activeTheme === "basic") footerText = `<div style="padding:1rem; text-align:center; border-top:1px solid #e2e8f0; font-size:0.7rem;">© BasicStudio · Tüm hakları saklıdır.</div>`;
        else if (activeTheme === "modern") footerText = `<div style="padding:1rem; text-align:center; background:#0e1220; border-top:1px solid #253045;">🚀 NeoStudio · Dijital dönüşüm</div>`;
        else footerText = `<div style="padding:1.2rem; text-align:center; backdrop-filter:blur(8px); border-top:1px solid rgba(255,255,255,0.1);">⭐ AURORA PREMIUM — Kusursuz deneyim</div>`;
        content += footerText;
        content += `</div>`; // mock-site
        container.innerHTML = content;

        // Tasarıma özel hover dinamik eklemeler
        if (activeTheme === "modern") {
            document.querySelectorAll('.theme-modern .card').forEach(c => {
                c.addEventListener('mouseenter', () => c.style.transform = 'translateY(-4px)');
                c.addEventListener('mouseleave', () => c.style.transform = '');
            });
        } else if (activeTheme === "premium") {
            document.querySelectorAll('.theme-premium .card').forEach(c => {
                c.addEventListener('mouseenter', () => c.style.transform = 'translateY(-8px)');
                c.addEventListener('mouseleave', () => c.style.transform = '');
            });
        }
    }

    function activateButtons() {
        document.querySelectorAll('.theme-btn').forEach(btn => {
            if (btn.dataset.theme === activeTheme) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        document.querySelectorAll('.pack-btn').forEach(btn => {
            if (btn.dataset.pack === activePack) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function update() {
        renderUI();
        activateButtons();
    }

    document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            activeTheme = btn.dataset.theme;
            update();
        });
    });
    document.querySelectorAll('.pack-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            activePack = btn.dataset.pack;
            update();
        });
    });

    update();
</script>
</body>
</html>
