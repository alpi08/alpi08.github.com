<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>UI Tasarım & Paket Demosu | Gerçek Site Şablonları</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c10;
            color: #fff;
            padding: 2rem 1.5rem;
        }

        /* Seçim Paneli */
        .selection-panel {
            max-width: 1300px;
            margin: 0 auto 2rem auto;
            background: #11141c;
            border-radius: 28px;
            padding: 1.5rem 2rem;
            border: 1px solid #2a2e3a;
            backdrop-filter: blur(4px);
        }

        .selection-panel h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #f39c12;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .design-btn, .package-btn {
            background: #1e2434;
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #ccd6f0;
        }

        .design-btn.active, .package-btn.active {
            background: #f39c12;
            color: #0a0c10;
            box-shadow: 0 0 8px rgba(243,156,18,0.5);
        }

        /* Önizleme Alanı */
        .preview-area {
            max-width: 1300px;
            margin: 0 auto;
            background: #0b0e14;
            border-radius: 32px;
            border: 1px solid #2a2e3a;
            overflow: hidden;
            min-height: 650px;
        }

        /* Tasarımların kapsayıcısı */
        .site-preview {
            width: 100%;
            height: 100%;
            transition: all 0.2s;
        }

        /* ---- BASİT TASARIM ŞABLONU ---- */
        .template-basic {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }
        .template-basic .header {
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .template-basic .logo {
            font-weight: 700;
            font-size: 1.3rem;
            color: #0f172a;
        }
        .template-basic .nav a {
            margin-left: 1.5rem;
            text-decoration: none;
            color: #334155;
            font-size: 0.9rem;
        }
        .template-basic .hero {
            background: #f1f5f9;
            padding: 3rem 2rem;
            text-align: center;
        }
        .template-basic .card {
            background: white;
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .template-basic .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        /* ---- NORMAL TASARIM ŞABLONU ---- */
        .template-normal {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0f172a, #1e293b);
            color: #f1f5f9;
        }
        .template-normal .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }
        .template-normal .logo {
            font-weight: 800;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #fff, #f97316);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .template-normal .nav a {
            margin-left: 1.8rem;
            text-decoration: none;
            color: #cbd5e1;
            font-weight: 500;
        }
        .template-normal .hero {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 3rem 2rem;
            text-align: center;
        }
        .template-normal .card {
            background: #1e293b;
            border-radius: 24px;
            padding: 1.2rem;
            border: 1px solid #334155;
            transition: 0.2s;
        }
        .template-normal .card:hover {
            transform: translateY(-4px);
            border-color: #f97316;
        }
        .template-normal .btn {
            background: #f97316;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
        }

        /* ---- PRO TASARIM ŞABLONU ---- */
        .template-pro {
            font-family: 'Poppins', 'Inter', sans-serif;
            background: #05070c;
            color: #fff;
        }
        .template-pro .header {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(16px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .template-pro .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #e84393, #f39c12);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .template-pro .nav a {
            margin-left: 2rem;
            text-decoration: none;
            color: #ddd;
            font-weight: 500;
            transition: 0.2s;
        }
        .template-pro .nav a:hover {
            color: #e84393;
        }
        .template-pro .hero {
            background: radial-gradient(circle at 30% 10%, #1a1a2e, #0a0c10);
            padding: 4rem 2rem;
            text-align: center;
        }
        .template-pro .card {
            background: rgba(30, 35, 55, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .template-pro .card:hover {
            border-color: #e84393;
            transform: scale(1.02);
        }
        .template-pro .btn {
            background: linear-gradient(95deg, #e84393, #f39c12);
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
            color: white;
        }

        /* ortak */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        .gallery-img {
            background: #2a2f3f;
            height: 150px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        .map-place {
            background: #1e2538;
            height: 200px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1rem 0;
        }
        .review-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        footer {
            padding: 2rem;
            text-align: center;
            border-top: 1px solid #2a2f3a;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

<div class="selection-panel">
    <h3><i class="fas fa-palette"></i> 1. Tasarım Stili (Gerçek UI Değişimi)</h3>
    <div class="btn-group" id="designGroup">
        <button class="design-btn" data-design="basic">📄 Basit · Minimal</button>
        <button class="design-btn active" data-design="normal">✨ Normal · Modern</button>
        <button class="design-btn" data-design="pro">💎 Pro · Premium</button>
    </div>

    <h3><i class="fas fa-cubes"></i> 2. Paket Seçimi (Özellikler)</h3>
    <div class="btn-group" id="packageGroup">
        <button class="package-btn" data-package="starter">🚀 Başlangıç</button>
        <button class="package-btn active" data-package="small">🏪 Küçük İşletme</button>
        <button class="package-btn" data-package="medium">🏢 Büyük İşletme</button>
        <button class="package-btn" data-package="pro">💼 Profesyonel Site</button>
    </div>
    <div style="font-size:0.7rem; text-align:center; margin-top:10px;">🎯 Tasarım değişince site baştan aşağı farklılaşır. Paket değişince içerik zenginliği artar.</div>
</div>

<div class="preview-area" id="preview">
    <!-- dinamik site şablonu yüklenecek -->
    <div style="padding: 40px; text-align:center;">Yükleniyor...</div>
</div>

<script>
    let currentDesign = "normal";
    let currentPackage = "small";

    // Paket içerik haritası (hangi bloklar gösterilsin)
    const packageContent = {
        starter: {
            showWhatsapp: true,
            showCall: true,
            showContactInfo: false,
            showForm: false,
            showSimpleGallery: true,
            showAdvancedGallery: false,
            showServices: true,
            showTeam: false,
            showReviews: false,
            showMap: true
        },
        small: {
            showWhatsapp: true,
            showCall: true,
            showContactInfo: true,
            showForm: true,
            showSimpleGallery: true,
            showAdvancedGallery: false,
            showServices: true,
            showTeam: true,
            showReviews: false,
            showMap: true
        },
        medium: {
            showWhatsapp: true,
            showCall: true,
            showContactInfo: true,
            showForm: true,
            showSimpleGallery: false,
            showAdvancedGallery: true,
            showServices: true,
            showTeam: true,
            showReviews: true,
            showMap: true
        },
        pro: {
            showWhatsapp: true,
            showCall: true,
            showContactInfo: true,
            showForm: true,
            showSimpleGallery: false,
            showAdvancedGallery: false,
            showServices: true,
            showTeam: true,
            showReviews: true,
            showMap: true,
            showExtraGallery: true
        }
    };

    function renderSite() {
        const container = document.getElementById("preview");
        const pkg = packageContent[currentPackage];
        
        // Tasarıma göre tamamen farklı HTML yapısı
        if (currentDesign === "basic") {
            container.innerHTML = basicTemplate(pkg);
        } else if (currentDesign === "normal") {
            container.innerHTML = normalTemplate(pkg);
        } else {
            container.innerHTML = proTemplate(pkg);
        }
    }

    // ----- BASİT ŞABLON -----
    function basicTemplate(pkg) {
        return `
        <div class="site-preview template-basic">
            <div class="header">
                <div class="logo">📁 BasicCo</div>
                <div class="nav">
                    <a href="#">Ana Sayfa</a>
                    <a href="#">Hizmetler</a>
                    <a href="#">İletişim</a>
                </div>
            </div>
            <div class="hero">
                <h2>Basit ve Etkili Çözümler</h2>
                <p>İhtiyacınız olan her şey sade bir arayüzde.</p>
                ${pkg.showWhatsapp || pkg.showCall ? `<div style="margin-top:1rem;">
                    ${pkg.showWhatsapp ? `<button class="btn" style="margin-right:10px;"><i class="fab fa-whatsapp"></i> WhatsApp</button>` : ''}
                    ${pkg.showCall ? `<button class="btn"><i class="fas fa-phone"></i> Ara</button>` : ''}
                </div>` : ''}
            </div>
            <div class="container">
                ${pkg.showContactInfo ? `<div class="card" style="margin:1rem 0;"><i class="fas fa-envelope"></i> info@basicco.com | <i class="fas fa-map-marker-alt"></i> İstanbul</div>` : ''}
                
                ${pkg.showForm ? `
                <div class="card">
                    <h4>İletişim Formu</h4>
                    <input type="text" placeholder="Adınız" style="width:100%; margin:8px 0; padding:8px; border-radius:8px; border:1px solid #ccc;">
                    <input type="email" placeholder="Email" style="width:100%; margin:8px 0; padding:8px; border-radius:8px;">
                    <button class="btn">Gönder</button>
                </div>
                ` : ''}
                
                ${pkg.showServices ? `
                <div class="card" style="margin:1rem 0;">
                    <h4>Hizmetler</h4>
                    <ul style="margin-top:8px;">
                        <li>Kaporta Düzeltme</li>
                        <li>Boyasız Göçük</li>
                        <li>Çekme & Şasi</li>
                    </ul>
                </div>
                ` : ''}
                
                ${pkg.showSimpleGallery ? `
                <div class="grid-3">
                    <div class="gallery-img">📸 Görsel 1</div>
                    <div class="gallery-img">📸 Görsel 2</div>
                    <div class="gallery-img">📸 Görsel 3</div>
                </div>
                ` : ''}
                
                ${pkg.showAdvancedGallery ? `
                <div class="grid-3">
                    <div class="gallery-img" style="background:#3a4a6e;">🎨 Proje A</div>
                    <div class="gallery-img" style="background:#3a4a6e;">🎨 Proje B</div>
                    <div class="gallery-img" style="background:#3a4a6e;">🎨 Proje C</div>
                </div>
                ` : ''}
                
                ${pkg.showTeam ? `
                <div class="card">
                    <h4>Ekibimiz</h4>
                    <div style="display:flex; gap:1rem; margin-top:10px;">
                        <div>👤 Ahmet Usta</div>
                        <div>👤 Elif Hanım</div>
                        <div>👤 Mert Bey</div>
                    </div>
                </div>
                ` : ''}
                
                ${pkg.showReviews ? `
                <div class="card">
                    <h4>Google Yorumları</h4>
                    <div>⭐⭐⭐⭐⭐ "Harika işçilik" - Mehmet</div>
                    <div>⭐⭐⭐⭐ "İlgili ekip" - Ayşe</div>
                </div>
                ` : ''}
                
                ${pkg.showMap ? `<div class="map-place"><i class="fas fa-map-marked-alt"></i> Google Maps Önizlemesi</div>` : ''}
                
                ${pkg.showExtraGallery ? `
                <div class="grid-3">
                    <div class="gallery-img" style="background:#4a5a7e;">✨ Premium 1</div>
                    <div class="gallery-img" style="background:#4a5a7e;">✨ Premium 2</div>
                    <div class="gallery-img" style="background:#4a5a7e;">✨ Premium 3</div>
                </div>
                ` : ''}
            </div>
            <footer>© BasicCo - Basit ve hızlı çözümler</footer>
        </div>
        `;
    }

    // ----- NORMAL ŞABLON -----
    function normalTemplate(pkg) {
        return `
        <div class="site-preview template-normal">
            <div class="header">
                <div class="logo">✨ Nexus Digital</div>
                <div class="nav">
                    <a href="#">Anasayfa</a>
                    <a href="#">Portfolyo</a>
                    <a href="#">İletişim</a>
                </div>
            </div>
            <div class="hero">
                <h1>Yaratıcı Çözümler</h1>
                <p>Modern tasarım, güçlü altyapı</p>
                ${pkg.showWhatsapp || pkg.showCall ? `<div style="margin-top:1rem;">
                    ${pkg.showWhatsapp ? `<button class="btn"><i class="fab fa-whatsapp"></i> WhatsApp</button>` : ''}
                    ${pkg.showCall ? `<button class="btn" style="margin-left:10px;"><i class="fas fa-phone-alt"></i> Hemen Ara</button>` : ''}
                </div>` : ''}
            </div>
            <div class="container">
                ${pkg.showContactInfo ? `<div class="card" style="margin:1rem 0; display:flex; justify-content:space-between;">
                    <span><i class="fas fa-envelope"></i> info@nexus.com</span>
                    <span><i class="fas fa-map-marker-alt"></i> İstanbul, Türkiye</span>
                </div>` : ''}
                
                ${pkg.showForm ? `
                <div class="card">
                    <h3>Hızlı İletişim</h3>
                    <div style="display:flex; gap:12px; flex-wrap:wrap;">
                        <input type="text" placeholder="Adınız" style="flex:1; background:#0f172a; border:1px solid #334155; border-radius:40px; padding:8px 16px; color:white;">
                        <input type="email" placeholder="E-posta" style="flex:1; background:#0f172a; border:1px solid #334155; border-radius:40px; padding:8px 16px;">
                        <button class="btn">Gönder</button>
                    </div>
                </div>
                ` : ''}
                
                ${pkg.showServices ? `
                <div class="grid-3">
                    <div class="card"><i class="fas fa-car"></i><br>Kaporta</div>
                    <div class="card"><i class="fas fa-paint-roller"></i><br>Boya</div>
                    <div class="card"><i class="fas fa-draw-polygon"></i><br>Çekme</div>
                </div>
                ` : ''}
                
                ${pkg.showSimpleGallery ? `
                <div class="grid-3">
                    <div class="gallery-img">📸 Proje 1</div>
                    <div class="gallery-img">📸 Proje 2</div>
                    <div class="gallery-img">📸 Proje 3</div>
                </div>
                ` : ''}
                
                ${pkg.showAdvancedGallery ? `
                <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:1rem; margin:2rem 0;">
                    <div class="gallery-img" style="height:180px;">🎯 Gelişmiş Proje A</div>
                    <div class="gallery-img" style="height:180px;">🎯 Gelişmiş Proje B</div>
                    <div class="gallery-img" style="height:180px;">🎯 Gelişmiş Proje C</div>
                    <div class="gallery-img" style="height:180px;">🎯 Gelişmiş Proje D</div>
                </div>
                ` : ''}
                
                ${pkg.showTeam ? `
                <div class="card" style="margin:1rem 0;">
                    <h3>Uzman Ekibimiz</h3>
                    <div style="display:flex; gap:1rem; flex-wrap:wrap;">
                        <div><i class="fas fa-user-tie"></i> Ahmet Yılmaz - Teknik Lider</div>
                        <div><i class="fas fa-user-graduate"></i> Elif Demir - Tasarım</div>
                        <div><i class="fas fa-user-astronaut"></i> Can Kaya - Proje Yöneticisi</div>
                    </div>
                </div>
                ` : ''}
                
                ${pkg.showReviews ? `
                <div class="card">
                    <h3><i class="fab fa-google"></i> Google Yorumları</h3>
                    <div class="review-card">⭐⭐⭐⭐⭐ “Harika iş çıkardılar, kesinlikle tavsiye ederim.” - Ali K.</div>
                    <div class="review-card">⭐⭐⭐⭐ “Hızlı ve kaliteli hizmet.” - Zeynep D.</div>
                    <div class="review-card">⭐⭐⭐⭐⭐ “Beykoz'un en iyisi!” - Mehmet S.</div>
                </div>
                ` : ''}
                
                ${pkg.showMap ? `<div class="map-place"><i class="fas fa-map"></i> Google Maps konum gösterimi</div>` : ''}
                
                ${pkg.showExtraGallery ? `
                <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:1rem;">
                    <div class="gallery-img" style="background: linear-gradient(145deg,#2a3a5a,#1e2a3a);">🏆 Premium 1</div>
                    <div class="gallery-img" style="background: linear-gradient(145deg,#2a3a5a,#1e2a3a);">🏆 Premium 2</div>
                    <div class="gallery-img" style="background: linear-gradient(145deg,#2a3a5a,#1e2a3a);">🏆 Premium 3</div>
                </div>
                ` : ''}
            </div>
            <footer>© Nexus Digital - Modern Dijital Çözümler</footer>
        </div>
        `;
    }

    // ----- PRO ŞABLON -----
    function proTemplate(pkg) {
        return `
        <div class="site-preview template-pro">
            <div class="header">
                <div class="logo">⚡ AURORA STUDIO</div>
                <div class="nav">
                    <a href="#">Ana Sayfa</a>
                    <a href="#">Projeler</a>
                    <a href="#">Studio</a>
                    <a href="#">İletişim</a>
                </div>
            </div>
            <div class="hero">
                <h1 style="font-size:3rem;">Premium Deneyim</h1>
                <p style="font-size:1.2rem;">Yaratıcılık ve teknoloji buluşuyor</p>
                ${pkg.showWhatsapp || pkg.showCall ? `<div style="margin-top:2rem;">
                    ${pkg.showWhatsapp ? `<button class="btn"><i class="fab fa-whatsapp"></i> WhatsApp</button>` : ''}
                    ${pkg.showCall ? `<button class="btn" style="margin-left:15px;"><i class="fas fa-phone-alt"></i> Hemen Ara</button>` : ''}
                </div>` : ''}
            </div>
            <div class="container">
                ${pkg.showContactInfo ? `<div class="card" style="margin:1rem 0; text-align:center;">
                    <i class="fas fa-envelope"></i> hello@aurorastudio.com &nbsp;|&nbsp; <i class="fas fa-map-marker-alt"></i> İstanbul / Global
                </div>` : ''}
                
                ${pkg.showForm ? `
                <div class="card">
                    <h3>İletişime Geçin</h3>
                    <div style="display: flex; flex-wrap: wrap; gap: 15px;">
                        <input type="text" placeholder="İsim" style="flex:1; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius: 60px; padding: 12px 20px; color:white;">
                        <input type="email" placeholder="Email" style="flex:1; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius: 60px; padding: 12px 20px;">
                        <button class="btn">Gönder</button>
                    </div>
                </div>
                ` : ''}
                
                ${pkg.showServices ? `
                <div class="grid-3">
                    <div class="card"><i class="fas fa-car-crash fa-2x"></i><br><h4>Kaporta</h4><p>Profesyonel çözümler</p></div>
                    <div class="card"><i class="fas fa-paint-roller fa-2x"></i><br><h4>Oto Boya</h4><p>Renk garantisi</p></div>
                    <div class="card"><i class="fas fa-draw-polygon fa-2x"></i><br><h4>Çekme & Şasi</h4><p>Hidrolik sistem</p></div>
                </div>
                ` : ''}
                
                ${pkg.showSimpleGallery ? `
                <div class="grid-3">
                    <div class="gallery-img" style="height:200px;">🌟 Görsel 1</div>
                    <div class="gallery-img" style="height:200px;">🌟 Görsel 2</div>
                    <div class="gallery-img" style="height:200px;">🌟 Görsel 3</div>
                </div>
                ` : ''}
                
                ${pkg.showAdvancedGallery ? `
                <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:1.5rem; margin:2rem 0;">
                    <div class="gallery-img" style="height:220px;">🖼️ Premium Proje A</div>
                    <div class="gallery-img" style="height:220px;">🖼️ Premium Proje B</div>
                    <div class="gallery-img" style="height:220px;">🖼️ Premium Proje C</div>
                    <div class="gallery-img" style="height:220px;">🖼️ Premium Proje D</div>
                </div>
                ` : ''}
                
                ${pkg.showTeam ? `
                <div class="card">
                    <h3>✨ Vizyoner Ekibimiz</h3>
                    <div style="display: flex; gap: 2rem; flex-wrap: wrap; margin-top: 1rem;">
                        <div><i class="fas fa-user-circle fa-2x"></i><br><strong>Ahmet Yılmaz</strong><br>Kreatif Direktör</div>
                        <div><i class="fas fa-user-circle fa-2x"></i><br><strong>Elif Demir</strong><br>Baş Tasarımcı</div>
                        <div><i class="fas fa-user-circle fa-2x"></i><br><strong>Can Kaya</strong><br>Teknoloji Lideri</div>
                    </div>
                </div>
                ` : ''}
                
                ${pkg.showReviews ? `
                <div class="card">
                    <h3><i class="fab fa-google"></i> Müşteri Yorumları</h3>
                    <div class="review-card">⭐⭐⭐⭐⭐ “Mükemmel bir ekip, hayalimizdeki siteyi yaptılar.” - Özgür Ş.</div>
                    <div class="review-card">⭐⭐⭐⭐⭐ “Profesyonellik ve kalite harika.” - Derya K.</div>
                    <div class="review-card">⭐⭐⭐⭐⭐ “Kesinlikle tavsiye ediyorum.” - Serkan A.</div>
                </div>
                ` : ''}
                
                ${pkg.showMap ? `<div class="map-place" style="background: radial-gradient(circle at 20% 30%, #1a1a2e, #0a0c10);"><i class="fas fa-map-marked-alt fa-2x"></i> Google Maps Etkileşimli Harita</div>` : ''}
                
                ${pkg.showExtraGallery ? `
                <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem;">
                    <div class="gallery-img" style="background: linear-gradient(145deg, #e84393, #f39c12);">✨ Ultra HD 1</div>
                    <div class="gallery-img" style="background: linear-gradient(145deg, #e84393, #f39c12);">✨ Ultra HD 2</div>
                    <div class="gallery-img" style="background: linear-gradient(145deg, #e84393, #f39c12);">✨ Ultra HD 3</div>
                </div>
                ` : ''}
            </div>
            <footer>© AURORA STUDIO — İleri Düzey Tasarım Deneyimi</footer>
        </div>
        `;
    }

    // Buton aktiflik güncelleme
    function updateButtons() {
        document.querySelectorAll('.design-btn').forEach(btn => {
            if (btn.dataset.design === currentDesign) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        document.querySelectorAll('.package-btn').forEach(btn => {
            if (btn.dataset.package === currentPackage) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function refresh() {
        renderSite();
        updateButtons();
    }

    // Olay dinleyicileri
    document.querySelectorAll('.design-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentDesign = btn.dataset.design;
            refresh();
        });
    });
    document.querySelectorAll('.package-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentPackage = btn.dataset.package;
            refresh();
        });
    });

    refresh();
</script>
</body>
</html>
