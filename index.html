<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tasarım Showcase | Basic · Medium · Pro</title>
    <!-- FONTLAR -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0c12;
            font-family: 'Inter', sans-serif;
            padding: 2rem 1.5rem;
        }

        /* SELECTION PANEL */
        .selection-dashboard {
            max-width: 1400px;
            margin: 0 auto 2rem auto;
            background: rgba(15, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1.5rem 2rem;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .badge-title {
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #f5a623;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .flex-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 28px;
        }
        .design-trigger, .pack-trigger {
            background: #1a1f2c;
            border: 1px solid #2c3445;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .design-trigger.active, .pack-trigger.active {
            background: #f5a623;
            border-color: #f5a623;
            color: #0a0c12;
            box-shadow: 0 0 12px rgba(245,166,35,0.6);
        }

        /* PREVIEW ALANI */
        .preview-stage {
            max-width: 1400px;
            margin: 0 auto;
            background: #05080f;
            border-radius: 2rem;
            padding: 1rem;
            border: 1px solid #202433;
        }

        /* ============================================ */
        /* TEMA 1: BASIT (sade, kartlar, sol frame)    */
        /* ============================================ */
        .theme-basic .mock-website {
            background: #f4f7fc;
            color: #1e2a3a;
            font-family: 'Inter', sans-serif;
            border-radius: 24px;
            overflow: hidden;
        }
        .theme-basic .head {
            background: white;
            padding: 1rem 2rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .theme-basic .hero-block {
            background: #eef2f8;
            padding: 2rem 2rem;
            text-align: center;
        }
        .theme-basic .card-item {
            background: white;
            border-radius: 20px;
            padding: 1.2rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid #eef2f8;
        }
        .theme-basic .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 1rem;
        }

        /* ============================================ */
        /* TEMA 2: SIRADAN/MODERN (sağ sidebar, modern) */
        /* ============================================ */
        .theme-medium .mock-website {
            background: #0e121f;
            color: #edf2ff;
            font-family: 'Space Grotesk', monospace;
            border-radius: 32px;
            overflow: hidden;
        }
        .theme-medium .head {
            background: #141b2c;
            padding: 1rem 2rem;
            border-bottom: 2px solid #e63946;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .theme-medium .hero-block {
            background: radial-gradient(circle at 20% 30%, #1e2a44, #0a0f1c);
            padding: 3rem 2rem;
            text-align: left;
        }
        .theme-medium .card-item {
            background: #17202f;
            border-radius: 28px;
            padding: 1.3rem;
            transition: all 0.2s;
            border: 1px solid #253045;
        }
        .theme-medium .card-item:hover { transform: translateY(-4px); border-color: #e63946; }
        .theme-medium .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 1.2rem;
        }

        /* ============================================ */
        /* TEMA 3: PROFESYONEL (arka plan video/görsel akışı, sticky, glam) */
        /* ============================================ */
        .theme-pro .mock-website {
            background: #03060c;
            color: #fff5e6;
            font-family: 'Playfair Display', serif;
            position: relative;
            overflow: hidden;
            border-radius: 48px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        /* Arka plan slider efekti */
        .theme-pro .bg-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: flex;
        }
        .theme-pro .bg-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        .theme-pro .bg-slide.active { opacity: 0.25; }
        .theme-pro .content-relative {
            position: relative;
            z-index: 2;
            backdrop-filter: blur(2px);
        }
        .theme-pro .head {
            background: rgba(10, 15, 25, 0.7);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .theme-pro .hero-block {
            text-align: center;
            padding: 5rem 2rem;
            background: radial-gradient(ellipse at 50% 30%, rgba(255,180,70,0.1), transparent);
        }
        .theme-pro .card-item {
            background: rgba(25, 35, 55, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 1.6rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.2,0.9,0.4,1.2);
        }
        .theme-pro .card-item:hover {
            transform: translateY(-12px);
            border-color: #ffb347;
            box-shadow: 0 30px 40px -20px black;
        }
        .theme-pro .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 1.8rem;
        }

        /* ortak */
        .flex-spread { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .grid-two { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 1rem; }
        .pill-tag { background: rgba(255,255,255,0.08); border-radius: 60px; padding: 4px 14px; font-size: 0.7rem; }
        .inner-pad { padding: 1.8rem; }
        hr { border-color: #2f3a4e; margin: 8px 0; }
        .contact-foot { margin-top: 1.2rem; text-align: center; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="selection-dashboard">
    <div class="badge-title"><i class="fas fa-bezier-curve"></i> 1. TASARIM KİMLİĞİ</div>
    <div class="flex-buttons" id="designGroup">
        <button class="design-trigger" data-design="basic">📘 Basit · Sade Düzen</button>
        <button class="design-trigger active" data-design="medium">🔥 Sıradan · Modern Akıcı</button>
        <button class="design-trigger" data-design="pro">💎 Profesyonel · Arka plan akan görsel</button>
    </div>

    <div class="badge-title"><i class="fas fa-cubes"></i> 2. PAKET (Özellik skalası)</div>
    <div class="flex-buttons" id="packageGroup">
        <button class="pack-trigger" data-pack="starter">🚀 Başlangıç</button>
        <button class="pack-trigger active" data-pack="business">🏪 Küçük İşletme</button>
        <button class="pack-trigger" data-pack="enterprise">🏢 Büyük İşletme</button>
        <button class="pack-trigger" data-pack="prosite">💼 Profesyonel Site</button>
    </div>
</div>

<div class="preview-stage" id="previewHolder">
    <div id="liveRender">Yükleniyor...</div>
</div>

<script>
    let currentDesign = "medium";
    let currentPack = "business";

    const packProps = {
        starter: { whatsapp:true,call:true,info:true,form:false,simpleGallery:true,advGallery:false,services:true,team:false,reviews:false,map:true,extraGallery:false },
        business: { whatsapp:true,call:true,info:true,form:true,simpleGallery:true,advGallery:false,services:true,team:true,reviews:false,map:true,extraGallery:false },
        enterprise: { whatsapp:true,call:true,info:true,form:true,simpleGallery:false,advGallery:true,services:true,team:true,reviews:true,map:true,extraGallery:false },
        prosite: { whatsapp:true,call:true,info:true,form:true,simpleGallery:false,advGallery:false,services:true,team:true,reviews:true,map:true,extraGallery:true }
    };

    // Arka plan slider (Profesyonel tema için)
    let bgInterval = null;
    function startProBackground() {
        if (currentDesign !== "pro") return;
        const slides = document.querySelectorAll('.bg-slide');
        if (!slides.length) return;
        let active = 0;
        if (bgInterval) clearInterval(bgInterval);
        const activate = (idx) => {
            slides.forEach((s, i) => {
                if (i === idx) s.classList.add('active');
                else s.classList.remove('active');
            });
        };
        activate(0);
        bgInterval = setInterval(() => {
            active = (active + 1) % slides.length;
            activate(active);
        }, 4500);
    }

    function stopProBackground() {
        if (bgInterval) { clearInterval(bgInterval); bgInterval = null; }
    }

    function renderSite() {
        const f = packProps[currentPack];
        const container = document.getElementById("liveRender");
        let themeClass = "";
        if (currentDesign === "basic") themeClass = "theme-basic";
        else if (currentDesign === "medium") themeClass = "theme-medium";
        else themeClass = "theme-pro";

        // HER TASARIM FARKLI HEADER, HERO, BUTON YERLEŞİMİ
        let headerHtml = "", heroHtml = "", brand = "", extraBg = "";
        
        if (currentDesign === "basic") {
            brand = "📁 BasicCo";
            headerHtml = `<div class="head"><div style="font-weight:700;">${brand}</div><div style="display:flex; gap:1rem;"><span>Ana Sayfa</span><span>Servisler</span><span>İletişim</span></div></div>`;
            heroHtml = `<div class="hero-block"><h2 style="font-size:1.9rem;">Güvenilir & Sade Çözümler</h2><p style="color:#4a627a;">Hızlı erişim, net hizmetler.</p></div>`;
        } else if (currentDesign === "medium") {
            brand = "◉ NEXUS STUDIO";
            headerHtml = `<div class="head"><div style="font-weight:800;">${brand}</div><div style="display:flex; gap:1.3rem;"><i class="fas fa-th-large"></i><span>Projeler</span><span>Ekip</span><span>İletişim</span></div></div>`;
            heroHtml = `<div class="hero-block"><h1 style="font-size:2.6rem;">Yaratıcılığını Konuştur</h1><p style="font-size:1rem;">Modern web deneyimi, akıcı arayüz.</p><button style="background:#e63946; border:none; border-radius:60px; padding:8px 28px; margin-top:1rem;">Keşfet</button></div>`;
        } else { // PRO
            brand = "✦ AURORA PREMIUM";
            headerHtml = `<div class="head"><div style="font-weight:800; font-size:1.4rem;">${brand}</div><div style="display:flex; gap:2rem;"><span>Ana Sayfa</span><span>Lüks Galeri</span><span>VIP Destek</span></div></div>`;
            heroHtml = `<div class="hero-block"><h1 style="font-size:4rem; font-weight:800;">Zirve Tasarım</h1><p>Premium kalite, benzersiz deneyim.</p><button style="background:linear-gradient(95deg,#ffb347,#e67e22); border:none; border-radius:80px; padding:12px 36px; margin-top:1.2rem;">İncele</button></div>`;
            // Arka plan görselleri (4 farklı, döngü)
            extraBg = `<div class="bg-slider">
                        <div class="bg-slide active" style="background-image: url('https://placehold.co/1920x1080/2c3e50/ffffff?text=Görsel+1');"></div>
                        <div class="bg-slide" style="background-image: url('https://placehold.co/1920x1080/34495e/ffffff?text=Görsel+2');"></div>
                        <div class="bg-slide" style="background-image: url('https://placehold.co/1920x1080/1a252f/ffffff?text=Görsel+3');"></div>
                        <div class="bg-slide" style="background-image: url('https://placehold.co/1920x1080/2c3e50/ffffff?text=Görsel+4');"></div>
                    </div>`;
        }

        let content = `<div class="mock-website ${themeClass}">`;
        if (currentDesign === "pro") content += extraBg + `<div class="content-relative">`;
        content += headerHtml;
        content += heroHtml;
        content += `<div class="inner-pad">`;

        // İLETİŞİM BUTON BLOĞU (farklı tasarımlarda farklı yerlerde olabilir)
        if (f.whatsapp || f.call || f.info) {
            let btnFlex = "";
            if (currentDesign === "basic") btnFlex = "background:#eef2fa; border-radius: 60px; padding:5px 18px; display:inline-flex; gap:6px;";
            else if (currentDesign === "medium") btnFlex = "background:#e63946; border-radius: 60px; padding:6px 20px; display:inline-flex; gap:8px; font-weight:500;";
            else btnFlex = "background:rgba(255,180,70,0.2); backdrop-filter:blur(10px); border-radius: 80px; padding:10px 28px; border:1px solid rgba(255,180,70,0.5);";
            
            content += `<div class="card-item" style="margin-bottom:1.5rem;">
                            <div class="flex-spread">
                                <div style="display: flex; gap: 14px; flex-wrap:wrap;">
                                    ${f.whatsapp ? `<span style="${btnFlex}"><i class="fab fa-whatsapp"></i> WhatsApp</span>` : ''}
                                    ${f.call ? `<span style="${btnFlex}"><i class="fas fa-phone-alt"></i> Tıkla Ara</span>` : ''}
                                </div>
                                ${f.info ? `<div style="font-size:0.7rem;"><i class="fas fa-envelope"></i> info@tasarim.co | 📍 İstanbul</div>` : ''}
                            </div>
                        </div>`;
        }

        // İLETİŞİM FORMU (pakete göre)
        if (f.form) {
            content += `<div class="card-item" style="margin-bottom:1.5rem;">
                            <div style="font-weight:600; margin-bottom:12px;">📋 Hızlı İletişim</div>
                            <div style="display: flex; flex-wrap: wrap; gap: 12px;">
                                <input placeholder="Adınız" style="background:#1e2535; border:1px solid #2f384a; border-radius: 60px; padding: 8px 16px; flex:1; color:white;">
                                <input placeholder="Email" style="background:#1e2535; border:1px solid #2f384a; border-radius: 60px; padding: 8px 16px; flex:1; color:white;">
                                <button style="background: ${currentDesign === 'pro' ? '#ffb347' : '#2c7da0'}; border: none; border-radius:60px; padding:8px 20px;">Gönder</button>
                            </div>
                        </div>`;
        }

        // HARİTA
        if (f.map) {
            content += `<div class="card-item" style="margin-bottom:1.5rem;"><div style="font-weight:600;">📍 Konum</div><div style="background:#1e2535; height:130px; border-radius:24px; display:flex; align-items:center; justify-content:center;">🗺️ Google Maps Gösterimi</div></div>`;
        }

        // HİZMETLER BÖLÜMÜ
        if (f.services) {
            content += `<div class="card-item" style="margin-bottom:1.5rem;"><div style="font-weight:600;">🛠️ Hizmetler</div><div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;"><span class="pill-tag">Kaporta</span><span class="pill-tag">Boyasız Göçük</span><span class="pill-tag">Çekme & Şasi</span></div></div>`;
        }

        // GALERİ
        if (f.simpleGallery) {
            content += `<div class="card-item" style="margin-bottom:1.5rem;"><div style="font-weight:600;">📸 Galeri</div><div class="gallery-grid"><div class="gallery-item" style="background:#1e2535; border-radius: 20px; padding:1rem; text-align:center;">Görsel 1</div><div class="gallery-item" style="background:#1e2535; border-radius: 20px; padding:1rem; text-align:center;">Görsel 2</div><div class="gallery-item" style="background:#1e2535; border-radius: 20px; padding:1rem; text-align:center;">Görsel 3</div></div></div>`;
        }
        if (f.advGallery) {
            content += `<div class="card-item" style="margin-bottom:1.5rem;"><div style="font-weight:600;">🎯 Gelişmiş Galeri</div><div class="gallery-grid" style="grid-template-columns:repeat(2,1fr);"><div class="gallery-item">Proje A</div><div class="gallery-item">Proje B</div><div class="gallery-item">Proje C</div><div class="gallery-item">Proje D</div></div></div>`;
        }
        if (f.extraGallery) {
            content += `<div class="card-item" style="margin-bottom:1.5rem;"><div style="font-weight:600;">💎 Ultra HD Premium</div><div class="gallery-grid"><div class="gallery-item">Ultra 1</div><div class="gallery-item">Ultra 2</div><div class="gallery-item">Ultra 3</div></div></div>`;
        }

        // EKİP
        if (f.team) {
            content += `<div class="card-item" style="margin-bottom:1.5rem;"><div style="font-weight:600;">👥 Ekibimiz</div><div class="grid-two"><div style="background:#1b212f; border-radius: 24px; padding: 1rem; text-align:center;"><i class="fas fa-user-tie fa-2x"></i><br/>Ahmet Usta</div><div style="background:#1b212f; border-radius: 24px; padding: 1rem; text-align:center;"><i class="fas fa-user-graduate fa-2x"></i><br/>Elif H.</div><div style="background:#1b212f; border-radius: 24px; padding: 1rem; text-align:center;"><i class="fas fa-user-astronaut fa-2x"></i><br/>Can Bey</div></div></div>`;
        }

        // YORUMLAR
        if (f.reviews) {
            content += `<div class="card-item" style="margin-bottom:1.5rem;"><div style="font-weight:600;"><i class="fab fa-google"></i> Müşteri Yorumları</div><div style="background:#1c2335; border-radius: 20px; padding: 12px; margin-bottom: 6px;">⭐⭐⭐⭐⭐ “Harika işçilik, hızlı servis.” – Mehmet</div><div style="color:#f5c542;">4.9 ★ (45 değerlendirme)</div></div>`;
        }

        content += `</div>`; // inner-pad

        // FOOTER - HER TASARIMDA FARKLI YERDE VE FARKLI STİLDE
        if (currentDesign === "basic") content += `<div class="contact-foot" style="padding:1rem; border-top:1px solid #e2e8f0;">© BasicCo · İletişim: 0532 264 15 01</div>`;
        else if (currentDesign === "medium") content += `<div style="padding:1rem; text-align:center; background:#0c1120; border-top:1px solid #253045;"><i class="fas fa-rocket"></i> Nexus Studio · Dijital çözümler</div>`;
        else content += `<div style="padding:1.2rem; text-align:center; backdrop-filter:blur(12px); border-top:1px solid rgba(255,255,255,0.1);"><i class="fas fa-crown"></i> AURORA PREMIUM · 7/24 Özel Destek</div>`;

        if (currentDesign === "pro") content += `</div>`; // content-relative kapat
        content += `</div>`;
        container.innerHTML = content;

        // Background slider başlat (Pro)
        if (currentDesign === "pro") startProBackground();
        else stopProBackground();

        // Özel hover efektleri modern için
        if (currentDesign === "medium") {
            document.querySelectorAll('.theme-medium .card-item').forEach(c => {
                c.addEventListener('mouseenter', () => c.style.transform = 'translateY(-4px)');
                c.addEventListener('mouseleave', () => c.style.transform = '');
            });
        } else if (currentDesign === "pro") {
            document.querySelectorAll('.theme-pro .card-item').forEach(c => {
                c.addEventListener('mouseenter', () => c.style.transform = 'translateY(-12px)');
                c.addEventListener('mouseleave', () => c.style.transform = '');
            });
        }
    }

    function updateButtons() {
        document.querySelectorAll('.design-trigger').forEach(btn => {
            if (btn.dataset.design === currentDesign) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        document.querySelectorAll('.pack-trigger').forEach(btn => {
            if (btn.dataset.pack === currentPack) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function refresh() {
        renderSite();
        updateButtons();
    }

    document.querySelectorAll('.design-trigger').forEach(btn => {
        btn.addEventListener('click', () => {
            currentDesign = btn.dataset.design;
            refresh();
        });
    });
    document.querySelectorAll('.pack-trigger').forEach(btn => {
        btn.addEventListener('click', () => {
            currentPack = btn.dataset.pack;
            refresh();
        });
    });

    refresh();
</script>
</body>
</html>
