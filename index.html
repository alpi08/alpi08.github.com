<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>UI Tasarım & Paket Demosu | Basit · Normal · Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c12;
            color: #f0f4fa;
            padding: 2rem 1.8rem;
        }

        /* kontrol paneli */
        .controls {
            max-width: 1400px;
            margin: 0 auto 2rem auto;
            background: rgba(18, 22, 32, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.6rem 2rem;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.3);
        }

        .section-label {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: #f39c12;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
        }

        .design-btn, .package-btn {
            background: #1e2434;
            border: 1px solid #2f3648;
            padding: 8px 22px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .design-btn.active, .package-btn.active {
            background: #f39c12;
            border-color: #f39c12;
            color: #0c0f17;
            box-shadow: 0 0 12px rgba(243,156,18,0.5);
        }

        /* PREVIEW ALANI */
        .preview-frame {
            max-width: 1400px;
            margin: 0 auto;
            background: #0b0f17;
            border-radius: 2rem;
            padding: 1rem;
            border: 1px solid #232834;
            transition: all 0.2s;
        }

        /* dinamik mock site wrapper */
        .mockup {
            transition: all 0.3s ease;
        }

        /* ---- TASARIMLAR ARASI FARKLILIKLAR (CSS tabanlı + JS yapısal fark) ---- */
        /* Basit tasarım */
        .design-basic .mock-header {
            background: #10141e;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #252c3a;
        }
        .design-basic .card {
            background: #131822;
            border-radius: 16px;
            padding: 1rem;
            border: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .design-basic .btn-custom {
            background: #2a3448;
            border-radius: 30px;
            padding: 6px 14px;
        }
        /* Normal tasarım */
        .design-normal .mock-header {
            background: linear-gradient(135deg, #191f2c, #11161f);
            padding: 1.2rem 2rem;
            border-bottom: 2px solid #e67e22;
        }
        .design-normal .card {
            background: #1c2332;
            border-radius: 24px;
            padding: 1.2rem;
            border: 1px solid #2e3a4e;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .design-normal .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.4);
        }
        /* Pro tasarım */
        .design-pro .mock-header {
            background: rgba(20, 28, 48, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding: 1.2rem 2rem;
        }
        .design-pro .card {
            background: rgba(30, 38, 58, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 1.4rem;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.3s cubic-bezier(0.2,0.9,0.4,1.2);
        }
        .design-pro .card:hover {
            transform: scale(1.02);
            border-color: #e84393;
            box-shadow: 0 20px 35px -12px black;
        }
    </style>
</head>
<body>

<div class="controls">
    <div class="section-label"><i class="fas fa-palette"></i> 1. Tasarım Stili (UI karakteri)</div>
    <div class="btn-group" id="designGroup">
        <button class="design-btn" data-design="basic">🧱 Basit · Düz</button>
        <button class="design-btn active" data-design="normal">✨ Normal · Modern</button>
        <button class="design-btn" data-design="pro">💎 Pro · Premium</button>
    </div>

    <div class="section-label"><i class="fas fa-cubes"></i> 2. Paket (içerik & özellikler)</div>
    <div class="btn-group" id="packageGroup">
        <button class="package-btn" data-package="baslangic">🚀 Başlangıç</button>
        <button class="package-btn active" data-package="kucuk">🏪 Küçük İşletme</button>
        <button class="package-btn" data-package="buyuk">🏢 Büyük İşletme</button>
        <button class="package-btn" data-package="prosite">💼 Profesyonel Site</button>
    </div>
    <div style="font-size:0.7rem; text-align:center; margin-top:6px;"><i class="fas fa-mouse-pointer"></i> Her seçimde site arayüzü, bileşenler ve düzen değişir</div>
</div>

<div class="preview-frame" id="previewArea">
    <div id="mockupRoot" class="mockup">
        <!-- dinamik olarak doldurulacak -->
        <div style="text-align:center; padding: 80px;">Yükleniyor...</div>
    </div>
</div>

<script>
    // Seçimler
    let currentDesign = "normal";   // basic, normal, pro
    let currentPackage = "kucuk";   // baslangic, kucuk, buyuk, prosite

    // Paket özellikleri (hangi bloklar gösterilsin)
    const packageFeatures = {
        baslangic: {
            whatsapp: true, callBtn: true, contactInfo: true,
            contactForm: false, simpleGallery: true, advancedGallery: false,
            services: true, aboutTeam: false, googleReviews: false, map: true,
            extraGallery: false
        },
        kucuk: {
            whatsapp: true, callBtn: true, contactInfo: true,
            contactForm: true, simpleGallery: true, advancedGallery: false,
            services: true, aboutTeam: true, googleReviews: false, map: true,
            extraGallery: false
        },
        buyuk: {
            whatsapp: true, callBtn: true, contactInfo: true,
            contactForm: true, simpleGallery: false, advancedGallery: true,
            services: true, aboutTeam: true, googleReviews: true, map: true,
            extraGallery: false
        },
        prosite: {
            whatsapp: true, callBtn: true, contactInfo: true,
            contactForm: true, simpleGallery: false, advancedGallery: false,
            services: true, aboutTeam: true, googleReviews: true, map: true,
            extraGallery: true
        }
    };

    // farklı tasarımlar için farklı header içerik ve buton stilleri, ayrıca layout yapısı
    function renderSite() {
        const features = packageFeatures[currentPackage];
        const root = document.getElementById("mockupRoot");
        
        // tasarım sınıfını root'a ekle
        root.className = `mockup design-${currentDesign}`;
        
        // Her tasarım için farklı header markup ve içerik düzeni
        let headerHtml = "";
        if (currentDesign === "basic") {
            headerHtml = `<div class="mock-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap:wrap;">
                            <div style="font-weight:800; font-size:1.3rem;">🔷 DemoStack</div>
                            <div style="display: flex; gap: 1.2rem;">
                                <span>Ana Sayfa</span><span>Hizmetler</span><span>İletişim</span>
                            </div>
                         </div>`;
        } else if (currentDesign === "normal") {
            headerHtml = `<div class="mock-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap:wrap;">
                            <div style="font-weight:800; background: linear-gradient(135deg,#fff,#e67e22); background-clip:text; -webkit-background-clip:text; color:transparent;">✨ StudioPlus</div>
                            <div style="display: flex; gap: 1.5rem;">
                                <i class="fas fa-search"></i>
                                <span>Keşfet</span><span>Projeler</span><span>Blog</span><span>İletişim</span>
                            </div>
                         </div>`;
        } else { // pro
            headerHtml = `<div class="mock-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap:wrap;">
                            <div style="font-weight:800; font-size:1.4rem; letter-spacing:-0.5px;">⚡ AURORA</div>
                            <div style="display: flex; gap: 2rem; background: rgba(255,255,255,0.05); padding: 6px 18px; border-radius: 60px;">
                                <span>Home</span><span>Services</span><span>Work</span><span>Contact</span>
                            </div>
                         </div>`;
        }
        
        let contentHtml = `<div style="padding: 1.8rem;">`;
        
        // İletişim ve buton alanı (pakete göre)
        if (features.whatsapp || features.callBtn || features.contactInfo) {
            let btnStyle = (currentDesign === "basic") ? "background:#2a3448; border-radius:40px; padding:6px 16px;" : 
                           (currentDesign === "normal") ? "background:#e67e22; border-radius:40px; padding:8px 20px; box-shadow:0 4px 8px rgba(0,0,0,0.2);" :
                           "background: linear-gradient(95deg, #e84393, #f39c12); border-radius:60px; padding:8px 24px; box-shadow:0 6px 14px rgba(0,0,0,0.3);";
            contentHtml += `<div class="card" style="margin-bottom: 1.5rem;">
                                <div style="display: flex; flex-wrap: wrap; justify-content: space-between; gap: 12px;">
                                    <div style="display: flex; gap: 12px;">
                                        ${features.whatsapp ? `<span style="${btnStyle}"><i class="fab fa-whatsapp"></i> WhatsApp</span>` : ''}
                                        ${features.callBtn ? `<span style="${btnStyle}"><i class="fas fa-phone-alt"></i> Tıkla Ara</span>` : ''}
                                    </div>
                                    ${features.contactInfo ? `<div style="font-size:0.75rem;"><i class="fas fa-envelope"></i> info@demo.com | <i class="fas fa-map-marker-alt"></i> İstanbul</div>` : ''}
                                </div>
                            </div>`;
        }
        
        // İletişim formu (sadece belirli paketler)
        if (features.contactForm) {
            contentHtml += `<div class="card" style="margin-bottom: 1.5rem;">
                                <div style="font-weight:600; margin-bottom: 12px;">📋 Hızlı İletişim</div>
                                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                                    <input type="text" placeholder="Adınız" style="background: #1e2535; border:1px solid #2f384a; border-radius: 60px; padding: 8px 16px; flex:1; color:white;">
                                    <input type="email" placeholder="Email" style="background: #1e2535; border:1px solid #2f384a; border-radius: 60px; padding: 8px 16px; flex:1; color:white;">
                                    <button style="background: ${currentDesign === 'pro' ? '#e84393' : '#e67e22'}; border: none; border-radius: 60px; padding: 8px 20px; color:white;">Gönder</button>
                                </div>
                            </div>`;
        }
        
        // Google Maps
        if (features.map) {
            contentHtml += `<div class="card" style="margin-bottom: 1.5rem;">
                                <div style="font-weight:600; margin-bottom: 10px;">📍 Konum</div>
                                <div style="background: #1b2335; height: 140px; border-radius: 20px; display: flex; align-items: center; justify-content: center;">
                                    <i class="fas fa-map-marked-alt"></i> Google Maps önizlemesi
                                </div>
                            </div>`;
        }
        
        // Hizmetler
        if (features.services) {
            contentHtml += `<div class="card" style="margin-bottom: 1.5rem;">
                                <div style="font-weight:600; margin-bottom: 12px;">🛠️ Hizmetlerimiz</div>
                                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 12px;">
                                    <div class="service-chip">Kaporta Düzeltme</div>
                                    <div class="service-chip">Boyasız Göçük</div>
                                    <div class="service-chip">Çekme & Şasi</div>
                                </div>
                            </div>`;
        }
        
        // Galeri – basit
        if (features.simpleGallery) {
            contentHtml += `<div class="card" style="margin-bottom: 1.5rem;">
                                <div style="font-weight:600; margin-bottom: 12px;">🖼️ Görsel Galeri</div>
                                <div style="display: grid; grid-template-columns: repeat(3,1fr); gap: 12px;">
                                    <div class="gallery-item" style="background:#202838; border-radius: 16px; padding: 12px; text-align:center;">Görsel 1</div>
                                    <div class="gallery-item" style="background:#202838; border-radius: 16px; padding: 12px; text-align:center;">Görsel 2</div>
                                    <div class="gallery-item" style="background:#202838; border-radius: 16px; padding: 12px; text-align:center;">Görsel 3</div>
                                </div>
                            </div>`;
        }
        
        // Gelişmiş galeri (büyük işletme)
        if (features.advancedGallery) {
            contentHtml += `<div class="card" style="margin-bottom: 1.5rem;">
                                <div style="font-weight:600; margin-bottom: 12px;">✨ Gelişmiş Galeri (Hover efekti)</div>
                                <div style="display: grid; grid-template-columns: repeat(2,1fr); gap: 16px;">
                                    <div class="gallery-adv" style="background: #2d3548; border-radius: 24px; padding: 20px; text-align:center; transition:0.2s;">Proje Alpha</div>
                                    <div class="gallery-adv" style="background: #2d3548; border-radius: 24px; padding: 20px; text-align:center;">Proje Beta</div>
                                    <div class="gallery-adv" style="background: #2d3548; border-radius: 24px; padding: 20px; text-align:center;">Proje Gamma</div>
                                    <div class="gallery-adv" style="background: #2d3548; border-radius: 24px; padding: 20px; text-align:center;">Proje Delta</div>
                                </div>
                            </div>`;
        }
        
        // Extra premium galeri (Profesyonel paket)
        if (features.extraGallery) {
            contentHtml += `<div class="card" style="margin-bottom: 1.5rem;">
                                <div style="font-weight:600; margin-bottom: 12px;">👑 Premium Galeri (3D Hover)</div>
                                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 18px;">
                                    <div class="premium-item" style="background: linear-gradient(145deg,#2a3248,#1b212f); border-radius: 28px; padding: 24px 12px; text-align:center;">✨ Ultra HD 1</div>
                                    <div class="premium-item" style="background: linear-gradient(145deg,#2a3248,#1b212f); border-radius: 28px; padding: 24px 12px; text-align:center;">✨ Ultra HD 2</div>
                                    <div class="premium-item" style="background: linear-gradient(145deg,#2a3248,#1b212f); border-radius: 28px; padding: 24px 12px; text-align:center;">✨ Ultra HD 3</div>
                                </div>
                            </div>`;
        }
        
        // Hakkımızda & Ekip (sadece belirli paketler)
        if (features.aboutTeam) {
            contentHtml += `<div class="card" style="margin-bottom: 1.5rem;">
                                <div style="font-weight:600; margin-bottom: 12px;">👥 Ekibimiz</div>
                                <div style="display: flex; flex-wrap: wrap; gap: 16px;">
                                    <div class="team-member" style="background: #1b212f; border-radius: 24px; padding: 16px; text-align:center; flex:1;">🧑‍🔧 <strong>Ahmet Usta</strong><br>Teknik</div>
                                    <div class="team-member" style="background: #1b212f; border-radius: 24px; padding: 16px; text-align:center; flex:1;">👩‍🎨 <strong>Elif S.</strong><br>Tasarım</div>
                                    <div class="team-member" style="background: #1b212f; border-radius: 24px; padding: 16px; text-align:center; flex:1;">🧑‍💻 <strong>Mert C.</strong><br>Proje Yön.</div>
                                </div>
                            </div>`;
        }
        
        // Google Yorumları
        if (features.googleReviews) {
            contentHtml += `<div class="card" style="margin-bottom: 1.5rem;">
                                <div style="font-weight:600; margin-bottom: 12px;"><i class="fab fa-google"></i> Müşteri Yorumları</div>
                                <div style="background: #202838; border-radius: 20px; padding: 12px; margin-bottom: 8px;">⭐⭐⭐⭐⭐ “Harika işçilik, hızlı servis.” – Ali K.</div>
                                <div style="background: #202838; border-radius: 20px; padding: 12px;">⭐⭐⭐⭐☆ “İlgili ekip, memnun kaldım.” – Zeynep D.</div>
                                <div style="margin-top: 8px; font-size:0.7rem;">4.9 ★ (32 değerlendirme)</div>
                            </div>`;
        }
        
        contentHtml += `</div>`;
        
        // Son olarak ekstra bir altbilgi (tasarıma göre farklı)
        let footerHtml = `<div style="padding: 1rem; text-align:center; border-top: 1px solid #2a3040; margin-top: 10px; font-size:0.7rem;">© Demo Tasarım – Seçtiğiniz: ${currentDesign.toUpperCase()} + ${currentPackage}</div>`;
        
        root.innerHTML = headerHtml + contentHtml + footerHtml;
        
        // Tasarıma özel ekstra interaktif animasyonlar (pro için hover scale, normal için kart hover)
        if (currentDesign === "pro") {
            const items = document.querySelectorAll('.card, .premium-item');
            items.forEach(el => {
                el.addEventListener('mouseenter', () => el.style.transform = 'translateY(-6px) scale(1.01)');
                el.addEventListener('mouseleave', () => el.style.transform = '');
            });
        } else if (currentDesign === "normal") {
            const cards = document.querySelectorAll('.card');
            cards.forEach(c => {
                c.addEventListener('mouseenter', () => c.style.transform = 'translateY(-4px)');
                c.addEventListener('mouseleave', () => c.style.transform = '');
            });
        } else {
            // basic: hiç hover etkisi yok
        }
    }
    
    function updateActiveButtons() {
        document.querySelectorAll('.design-btn').forEach(btn => {
            if (btn.dataset.design === currentDesign) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        document.querySelectorAll('.package-btn').forEach(btn => {
            if (btn.dataset.package === currentPackage) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    
    function refresh() {
        renderSite();
        updateActiveButtons();
    }
    
    // Olay dinleyiciler
    document.querySelectorAll('.design-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentDesign = btn.dataset.design;
            refresh();
        });
    });
    document.querySelectorAll('.package-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentPackage = btn.dataset.package;
            refresh();
        });
    });
    
    // başlangıç
    refresh();
</script>
</body>
</html>
